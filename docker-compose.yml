services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: incident
      POSTGRES_PASSWORD: incident123
      POSTGRES_DB: incident_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U incident']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://incident:incident123@postgres:5432/incident_db
      REDIS_URL: redis://redis:6379
      PORT: '3000'
      NODE_ENV: production
      CORS_ORIGIN: http://localhost
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/database/seed.js
    environment:
      DATABASE_URL: postgresql://incident:incident123@postgres:5432/incident_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - seed
    restart: 'no'

volumes:
  postgres_data:
  redis_data:
